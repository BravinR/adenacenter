services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Passed at build time only — Next.js needs DATABASE_URL
        # during build for any server-side data fetching / RSC
        DATABASE_URL: ${DATABASE_URL}
    image: adenacenter-web
    container_name: adenacenter
    ports:
      - "3000:3000"
    environment:
      # Runtime secrets — loaded from your .env file
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
